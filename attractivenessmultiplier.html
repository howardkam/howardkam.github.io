<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Assessment</title>
    <style>
        /* 1. Global Reset & Full Screen Flex */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #bd4f6c;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 2. Simplified Flexbox Container (No border/bg) */
        .main-container {
            display: flex;
            flex-direction: column;
            justify-content: center; 
            align-items: center;     
            width: 100vw;
            height: 100vh;
            max-width: 1200px;
            padding: 10px; /* Reduced margin/padding */
            color: white;
            text-align: center;
        }

        h2 { 
            flex-shrink: 0;
            font-size: clamp(1.4rem, 4vw, 2.2rem); 
            font-weight: 900; 
            text-transform: uppercase; 
            margin-bottom: 15px;
            letter-spacing: 1px;
        }
        
        /* 3. Streamlined Content Box */
        .content-box {
            display: flex;
            flex-direction: column;
            flex-grow: 1; 
            flex-shrink: 1; 
            width: 100%;
            max-width: 850px;
            margin-bottom: 20px;
            padding: clamp(15px, 2.5vw, 25px);
            background-color: rgba(0, 0, 0, 0.15); /* Slightly darker for contrast against base bg */
            border-radius: 15px;
            font-size: clamp(0.85rem, 2vw, 1.05rem); 
            line-height: 1.5; 
            overflow-y: auto;
        }

        .input-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-shrink: 0; 
            gap: 15px;
            padding-bottom: 10px;
        }

        input[type="number"] {
            background-color: rgba(0, 0, 0, 0.2); 
            border: 2px solid white;
            border-radius: 12px; 
            padding: 10px; 
            color: white; 
            font-size: clamp(1.8rem, 7vw, 3rem);
            width: clamp(90px, 18vw, 140px); 
            text-align: center; 
            outline: none; 
            font-weight: bold;
        }

        button {
            background-color: white; 
            color: #bd4f6c; 
            border: none;
            padding: 12px 40px; 
            border-radius: 50px; 
            font-weight: 900;
            font-size: clamp(0.8rem, 1.8vw, 1rem);
            cursor: pointer; 
            text-transform: uppercase; 
            transition: 0.2s ease-in-out;
        }

        button:hover {
            transform: scale(1.03);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        /* 4. Results Compact Styling */
        .score-display {
            font-size: clamp(2.2rem, 9vw, 4.5rem);
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 5px;
        }

        .growth-list {
            text-align: left;
            margin-top: 10px;
        }

        .growth-list h3 {
            font-size: 0.9rem;
            margin-bottom: 8px;
            text-transform: uppercase;
            opacity: 0.8;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 4px;
        }

        .growth-item {
            background: rgba(255,255,255,0.06);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 6px;
            border-left: 3px solid white;
            font-size: 0.85rem;
        }

        .growth-item strong { text-transform: uppercase; color: #ffda79; font-size: 0.75rem; }

        @media (max-width: 600px) {
            .content-box { padding: 12px; }
            h2 { margin-bottom: 10px; }
        }
    </style>
</head>
<body>

    <div class="main-container" id="container">
        <h2 id="title">Physical Attractiveness</h2>
        
        <div class="content-box" id="display-area">
            This is your aesthetic 'front door'—how you are perceived visually by the world. High scores reflect peak grooming, fitness, and natural symmetry, while lower scores suggest neglect or significant room for physical improvement.
        </div>
        
        <div class="input-area" id="control-area">
            <input type="number" id="rating-input" pattern="[0-9]*" inputmode="numeric" min="1" max="10" value="5">
            <button onclick="handleNext()">Next Category</button>
        </div>
    </div>

    <script>
        const questions = [
            { id: "phys", title: "Physical Attractiveness", guide: "This is your aesthetic 'front door'—how you are perceived visually by the world. High scores reflect peak grooming, fitness, and natural symmetry, while lower scores suggest neglect or significant room for physical improvement.", advice: "Focus on fitness (resistance training), skin-care consistency, and upgrading your wardrobe to fit your body type." },
            { id: "wealth", title: "Financial Wealth", guide: "This measures your command over resources and your ability to provide stability. A 10 represents complete financial independence and generational wealth, whereas a 1 indicates being burdened by debt.", advice: "Audit your spending, start an automated high-yield savings plan, and invest in a skill that increases your hourly market value." },
            { id: "socialConn", title: "Supportive Friendships", guide: "This reflects the quality of your inner circle and the people who would stand by you in a crisis. Consider whether you have a deep network or if your life is largely transactional.", advice: "Initiate 'no-agenda' check-ins with old friends and join a community group (sports, hobby, or volunteer) to expand your circle." },
            { id: "proConn", title: "Professional Connections", guide: "This is your 'network net worth' or your access to influential decision-makers. High scores mean you are one phone call away from major opportunities.", advice: "Update your LinkedIn, attend industry mixers, and offer to buy coffee for a mentor in the field you want to grow in." },
            { id: "hobbies", title: "Hobbies and Interests", guide: "This determines how multi-dimensional you are. Engaging in high-skill or unique passions earns a high score, while passive consumption (TV/Games) suggests a 1.", advice: "Pick one skill-based hobby (instrument, martial arts, cooking) and commit to a 30-day challenge to move from consumer to creator." },
            { id: "skills", title: "Practical Skills", guide: "This measures your utility in the real world, from technical expertise to survival skills. High scores go to polymaths who can fix or build almost anything.", advice: "Learn basic home/car repair via YouTube or take a first-aid certification course to increase your real-world utility." },
            { id: "empathy", title: "Empathy", guide: "This is your capacity to understand and share the feelings of others accurately. Attuned individuals score highly; self-centered or oblivious score low.", advice: "Practice active listening—ask follow-up questions without talking about yourself. Try to volunteer for a cause that forces you into someone else's shoes." },
            { id: "courage", title: "Courage", guide: "This is your willingness to face fear or uncertainty to do what is right. High scores are for those who take calculated risks and show integrity.", advice: "Start small: speak up in a meeting when you disagree or do one thing every day that makes you socially uncomfortable until it's normal." },
            { id: "acadIntel", title: "Academic Intelligence", guide: "This tracks your ability to process complex information and formal logic. A high score suggests mastery of abstract concepts.", advice: "Read one non-fiction book per month or take a free online course (Coursera/MIT) on a subject completely outside your comfort zone." },
            { id: "socialIntel", title: "Social Intelligence", guide: "This is your 'EQ' and your ability to navigate any room with ease. Master communicators score a 10; those who alienate people score low.", advice: "Study body language basics and record yourself speaking to identify awkward habits. Practice the art of the 'small talk' transition." },
            { id: "motivation", title: "Self-Control & Motivation", guide: "This represents your internal engine and your ability to delay gratification. High scores reflect elite discipline; low scores suggest impulsivity.", advice: "Use a habit tracker. Start with one non-negotiable morning task and build a streak. Eliminate high-dopamine distractions (phone/sugar) for set hours." }
        ];

        let currentIndex = 0;
        const answers = {};

        function updateUI() {
            const q = questions[currentIndex];
            document.getElementById('title').innerText = q.title;
            document.getElementById('display-area').innerHTML = q.guide;
            document.getElementById('rating-input').value = 5;
        }

        function handleNext() {
            const val = parseInt(document.getElementById('rating-input').value);
            if (val < 1 || val > 10 || isNaN(val)) {
                alert("Please enter a number between 1 and 10.");
                return;
            }

            answers[questions[currentIndex].id] = val;
            currentIndex++;

            if (currentIndex < questions.length) {
                updateUI();
            } else {
                calculateResults();
            }
        }

        function calculateResults() {
            const vals = Object.values(answers);
            const average = (vals.reduce((a, b) => a + b, 0) / vals.length).toFixed(1);
            
            document.getElementById('title').innerText = "Overall Rating";
            
            let growthHTML = `<div class="score-display">${average}</div>`;
            
            const lowCategories = questions.filter(q => answers[q.id] < 6);
            
            if (lowCategories.length > 0) {
                growthHTML += `<div class="growth-list"><h3>Personal Growth Strategy</h3>`;
                lowCategories.forEach(cat => {
                    growthHTML += `
                        <div class="growth-item">
                            <strong>${cat.title}:</strong> ${cat.advice}
                        </div>
                    `;
                });
                growthHTML += `</div>`;
            } else {
                growthHTML += `<p>Exemplary scores. Maintain your trajectory.</p>`;
            }

            document.getElementById('display-area').innerHTML = growthHTML;
            document.getElementById('control-area').innerHTML = `
                <button onclick="location.reload()">Restart</button>
            `;
        }
    </script>
</body>
</html>
