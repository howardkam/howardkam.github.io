<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha Zero</title>
    <script src="https://unpkg.com/p5"></script>
    <script src="https://unpkg.com/p5.collide2d"></script>
</head>

<body>
    <script>
        var w = window.innerWidth;
        var h = window.innerHeight;
        var x = w / 2;
        var y = h / 2;
        var barrier;

        function setup() {
            createCanvas(w, h);
            barrier = new barrier();
        }

        function draw() {
            clear();
            barrier.show();
            barrier.update();
            strokeWeight(0);
            fill(color('red'));
            circle(x, y, 50)
            if (keyIsDown(73)) {
                y -= 5
            }
            if (keyIsDown(75)) {
                y += 5
            }
            if (keyIsDown(74)) {
                x -= 5
            }
            if (keyIsDown(76)) {
                x += 5
            }
        }

        function barrier() {
            this.width = random(100, 400);
            this.height = random(50, 100);
            this.x = w + this.width;
            this.y = random(this.height, h - this.height);
            this.show = function () {
                fill(color('black'));
                rect(this.x, this.y, this.width, this.height);
            }
            this.update = function () {
                if (this.x != 0) {
                    this.x -= 20;
                }
            }
        }
    </script>

</body>

</html>
